<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emerging Technology Literacy Assessment | AceVETS & iVETS</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #0b1b2b;
      --primary-blue: #1f3b5b;
      --accent-cyan: #22c7ff;
      --accent-orange: #ffb347;
      --acevets-color: #3b82f6;
      --ivets-color: #f59e0b;
      --text-light: #f8fafc;
      --text-gray: #b8c2cf;
      --success-green: #22c55e;
      --card-bg: rgba(12, 27, 43, 0.78);
      --card-border: rgba(160, 174, 192, 0.22);
      --soft-bg: rgba(15, 23, 42, 0.52);
      --soft-border: rgba(148, 163, 184, 0.16);
      --surface-light: #f5f7fa;
      --surface-white: rgba(255,255,255,0.92);
      --ink-dark: #0f172a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 18%),
        linear-gradient(135deg, #091521 0%, #10253b 46%, #16273a 100%);
      color: var(--text-light);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
        radial-gradient(circle at 15% 20%, rgba(184,138,68,0.10), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(111,135,157,0.12), transparent 24%);
      background-size: 120px 120px, 120px 120px, auto, auto;
      mix-blend-mode: screen;
      opacity: 0.58;
    }
    .stars { display: none; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
    @keyframes twinkle { 0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)} }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .container { width: min(96vw, 1680px); max-width: none; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
    .header {
      text-align: center; padding: 46px 28px;
      background:
        linear-gradient(135deg, rgba(16, 37, 59, 0.94) 0%, rgba(11, 27, 43, 0.92) 100%),
        linear-gradient(90deg, rgba(184,138,68,0.10), rgba(184,138,68,0));
      border-radius: 24px; border: 1px solid rgba(184, 198, 214, 0.18); margin-bottom: 40px;
      backdrop-filter: blur(10px); animation: slideDown 0.6s ease-out;
      position: relative;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(3, 12, 24, 0.34);
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.06) 46%, transparent 54%),
        radial-gradient(circle at top right, rgba(184,138,68,0.16), transparent 26%);
      pointer-events: none;
    }
    h1 {
      font-family: 'Inter', sans-serif; font-size: clamp(2.1rem, 5vw, 3.55rem); font-weight: 800;
      background: linear-gradient(135deg, #ffffff 0%, #dbe5f0 58%, #dbe5f0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 16px; letter-spacing: -0.03em;
      text-transform: none;
    }
    .subtitle { font-size: clamp(1rem, 2.5vw, 1.2rem); color: #d4dce5; font-weight: 500; margin-bottom: 12px; }
    .tagline { font-size: clamp(0.85rem, 2vw, 0.96rem); color: #d8b37a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; }

    .card, .course-shell {
      background: linear-gradient(180deg, rgba(12, 27, 43, 0.88), rgba(12, 27, 43, 0.76)); border: 1px solid var(--card-border); border-radius: 18px;
      padding: 32px; margin-bottom: 24px; backdrop-filter: blur(10px); transition: all 0.3s ease;
      animation: fadeIn 0.6s ease-out;
      box-shadow: 0 20px 50px rgba(6, 14, 24, 0.18);
    }
    .card:hover, .course-shell:hover { border-color: var(--accent-cyan); box-shadow: 0 8px 32px rgba(6,182,212,0.15); transform: translateY(-2px); }
    .program-cards, .course-grid, .summary-grid, .pathway-grid, .stats-grid, .standard-grid, .module-grid {
      display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .program-card, .course-card, .summary-card, .pathway-card, .stat-card, .standard-card, .module-card, .video-card, .quiz-card {
      background: rgba(15, 23, 42, 0.45); border: 1px solid var(--soft-border); border-radius: 16px; padding: 24px; position: relative;
    }
    .program-card::before, .course-card::before, .summary-card::before, .pathway-card::before, .stat-card::before, .standard-card::before, .module-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #06b6d4, #3b82f6, #8b5cf6, #f59e0b); border-radius: 16px 16px 0 0;
    }
    .program-card.acevets { border-color: rgba(59, 130, 246, 0.3); }
    .program-card.ivets { border-color: rgba(245, 158, 11, 0.3); }
    .program-card.acevets:hover { border-color: var(--acevets-color); box-shadow: 0 12px 40px rgba(59,130,246,0.2); }
    .program-card.ivets:hover { border-color: var(--ivets-color); box-shadow: 0 12px 40px rgba(245,158,11,0.2); }
    .program-card, .course-card { transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease, background .35s ease, filter .35s ease; overflow: hidden; transform-origin: center; }
    .program-card:hover, .course-card:hover, .module-card:hover, .pathway-card:hover, .summary-card:hover, .standard-card:hover, .stat-card:hover, .trust-card:hover, .mission-card:hover, .signal-card:hover, .briefing-card:hover, .hero-metric:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 22px 48px rgba(2, 8, 23, 0.28); filter: brightness(1.08); }

    .program-icon, .course-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .program-title, .course-title { font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }

    .program-card p,
    .course-card p,
    .summary-card p,
    .pathway-card p,
    .stat-card p,
    .standard-card p,
    .module-card p,
    .program-card li,
    .course-card li,
    .summary-card li,
    .pathway-card li,
    .stat-card li,
    .standard-card li,
    .module-card li,
    .program-card .muted,
    .course-card .muted,
    .summary-card .muted,
    .pathway-card .muted,
    .stat-card .muted,
    .standard-card .muted,
    .module-card .muted {
      color: #ffffff;
    }

    .program-card .program-subtitle,
    .course-card .program-subtitle,
    .results-title,
    .section-heading,
    .mini-heading {
      color: #ffffff;
    }

    .program-subtitle, .muted, .helper, .soft-text { color: #eef4fb; }
    .program-features, .bullet-list { list-style: none; margin: 16px 0; }
    .program-features li, .bullet-list li { padding: 8px 0 8px 24px; position: relative; color: #ffffff; font-size: .94rem; }
    .program-features li::before, .bullet-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent-cyan); font-weight: 700; }

    .btn {
      background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: 1px solid rgba(210, 224, 236, 0.18); padding: 16px 32px;
      border-radius: 12px; font-size: 1.02rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
      text-transform: uppercase; letter-spacing: 0.08em; box-shadow: 0 8px 24px rgba(5,18,31,0.24); width: 100%; margin-top: 16px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(37,99,235,0.28); }
    .btn-secondary { background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(148,163,184,0.10)); box-shadow: none; border: 1px solid rgba(184,198,214,0.16); }
    .btn-secondary:hover { background: linear-gradient(135deg, rgba(255,255,255,0.16), rgba(148,163,184,0.16)); }
    .btn-inline { width: auto; display: inline-block; }

    .progress-bar { width: 100%; height: 8px; background: rgba(100, 116, 139, 0.3); border-radius: 999px; overflow: hidden; margin: 24px 0; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--acevets-color)); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

    .question-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 18px; color: var(--text-light); }
    .question-helper { color: #eef4fb; margin-bottom: 18px; }
    .options-grid, .checkbox-group { display: grid; gap: 16px; margin: 24px 0; }
    .option-card, .checkbox-option {
      background: rgba(30, 41, 59, 0.4); border: 2px solid var(--card-border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s ease; position: relative;
    }
    .option-card:hover, .checkbox-option:hover { border-color: var(--accent-cyan); background: rgba(30, 41, 59, 0.6); transform: translateX(4px); }
    .option-card.selected, .checkbox-option.checked { border-color: var(--accent-cyan); background: rgba(6, 182, 212, 0.15); }
    .option-card.selected::after {
      content: '✓'; position: absolute; top: 16px; right: 16px; color: var(--accent-cyan); font-weight: bold; font-size: 1.5rem;
    }
    .checkbox-option { display: flex; align-items: center; }
    .checkbox-option input[type="checkbox"] { width: 22px; height: 22px; margin-right: 16px; margin-top: 2px; accent-color: var(--accent-cyan); }
    .option-title-wrap { display:flex; flex-direction:column; gap:6px; }
    .option-brief { color: #ffffff; font-weight: 500; font-size: .96rem; line-height:1.5; }
    .option-task { color: #f3f7fb; font-size: .9rem; line-height:1.55; }
    .text-input {
      width: 100%; border-radius: 12px; border: 1px solid var(--soft-border); background: rgba(15,23,42,.55); color: white; padding: 14px 16px; font-size: 1rem; margin-top: 14px;
    }

    .navigation-buttons { display: flex; gap: 16px; margin-top: 32px; }
    .navigation-buttons button { flex: 1; }

    .results-header { text-align: center; padding: 48px 24px; margin-bottom: 16px; }
    .results-title {
      font-family: 'Inter', sans-serif; font-size: 2.5rem; font-weight: 800; margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff, #d4e0eb 65%, #dbe5f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.03em;
    }
    .recommendation-card {
      background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.1)); border: 2px solid var(--accent-cyan); border-radius: 16px; padding: 32px; margin-bottom: 24px;
    }
    .score-meter { width: 100%; height: 24px; background: rgba(100,116,139,0.3); border-radius: 12px; overflow: hidden; margin: 16px 0; position: relative; }
    .score-fill { height: 100%; background: linear-gradient(90deg, var(--accent-orange), var(--success-green)); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 12px; }
    .score-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 700; font-size: 0.875rem; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .tech-badges { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
    .tech-badge, .pill {
      background: linear-gradient(135deg, var(--acevets-color), var(--accent-cyan)); color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.875rem; font-weight: 600; display: inline-block;
    }
    .pill.alt { background: linear-gradient(135deg, rgba(16,185,129,.9), rgba(6,182,212,.9)); }
    .section-heading { font-size: 1.75rem; margin-bottom: 16px; }
    .mini-heading { font-size: 1.15rem; margin-bottom: 8px; }
    .price-tag {
      display: inline-flex; align-items: center; gap: 8px; font-weight: 800; padding: 10px 14px; border-radius: 999px; background: rgba(16,185,129,.12); color: #c7ffe7; border: 1px solid rgba(16,185,129,.25);
    }
    .top-note { padding: 18px 20px; border-radius: 14px; background: rgba(6,182,212,.1); border: 1px solid rgba(6,182,212,.2); margin-bottom: 22px; }
    .readiness-grid { display:grid; gap:14px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-top: 18px; }
    .readiness-card { background: rgba(15,23,42,.42); border: 1px solid var(--soft-border); border-radius: 14px; padding: 16px; }
    .readiness-card h4 { margin-bottom: 8px; font-size: 1rem; }
    .course-card .btn { margin-top: 18px; }
    .course-card p { line-height: 1.6; }
    .results-wide { width: min(99vw, 1860px); padding-left: 12px; padding-right: 12px; }
    .results-card { padding: 26px 22px; }
    .results-card .section-heading { margin-bottom: 10px; }
    .horizontal-course-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
      align-items: stretch;
    }
    .horizontal-course-row .course-card {
      height: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    .horizontal-course-row .course-card .btn { margin-top: auto; }
    .horizontal-course-row .course-card .muted:last-of-type { margin-bottom: 18px; }
    .horizontal-course-row.secondary-row {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .course-shell { overflow: hidden; }
    .course-hero {
      display: grid; grid-template-columns: 1.3fr .7fr; gap: 24px; align-items: stretch; margin-bottom: 24px;
    }
    .course-hero-main, .course-hero-side {
      background: rgba(15,23,42,.45); border: 1px solid var(--soft-border); border-radius: 18px; padding: 24px;
    }
    .course-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
    .tab-btn {
      border: 1px solid var(--soft-border); background: rgba(15,23,42,.45); color: var(--text-light); padding: 10px 16px; border-radius: 999px; cursor: pointer; font-weight: 600;
    }
    .tab-btn.active { background: linear-gradient(135deg, rgba(6,182,212,.2), rgba(59,130,246,.2)); border-color: rgba(6,182,212,.4); color: white; }
    .accordion { border: 1px solid var(--soft-border); border-radius: 14px; overflow: hidden; margin-bottom: 14px; background: rgba(15,23,42,.38); }
    .accordion-header {
      width: 100%; text-align: left; background: transparent; color: white; border: none; padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700;
    }
    .accordion-body { padding: 0 20px 20px; color: var(--text-gray); }
    .module-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .module-meta .pill { font-size: .8rem; }
    .example-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap: 14px; margin-top: 14px; }
    .video-card, .quiz-card { border: 1px solid var(--soft-border); background: rgba(30,41,59,.35); }
    .video-card h5, .quiz-card h5 { font-size: 1rem; margin-bottom: 6px; }
    .course-actions { display: flex; gap: 14px; flex-wrap: wrap; }

    .download-section { text-align: center; margin-top: 40px; padding: 32px; background: rgba(16, 185, 129, 0.1); border: 2px solid var(--success-green); border-radius: 16px; }

    .assessment-shell { max-width: 1020px; margin: 0 auto; }
    .assessment-header { max-width: 1020px; margin: 0 auto 28px; }
    .assessment-card {
      max-width: 1020px; margin: 0 auto 24px; padding: 34px 36px;
      background: linear-gradient(135deg, rgba(22, 33, 53, 0.92), rgba(15, 23, 42, 0.92));
      border: 1px solid rgba(100,116,139,0.34);
      box-shadow: 0 18px 50px rgba(2, 8, 23, 0.3);
    }
    .assessment-meta { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom: 6px; }
    .assessment-step { color: var(--accent-cyan); font-size: .9rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .assessment-helper-top { color: #eef4fb; font-size: .95rem; }
    .assessment-card .progress-bar { margin: 14px 0 24px; }
    .assessment-card .question-title { font-size: clamp(1.45rem, 2vw, 1.9rem); margin-bottom: 10px; }
    .assessment-card .question-helper { margin-bottom: 20px; max-width: 760px; }
    .assessment-card .options-grid, .assessment-card .checkbox-group { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .assessment-card .option-card, .assessment-card .checkbox-option { min-height: 104px; padding: 18px 18px 18px 20px; }
    .assessment-card .option-card strong, .assessment-card .checkbox-option strong { font-size: 1rem; }
    .assessment-card .navigation-buttons { margin-top: 28px; }

    .assessment-visual {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      min-height: 240px;
      margin-bottom: 22px;
      border: 1px solid rgba(212,175,55,0.24);
      background-size: cover;
      background-position: center;
      box-shadow: 0 20px 45px rgba(2,8,23,0.28);
    }
    .assessment-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(8,17,31,0.92) 0%, rgba(8,17,31,0.78) 38%, rgba(8,17,31,0.35) 100%),
        linear-gradient(180deg, rgba(15,23,42,0.08), rgba(15,23,42,0.5));
    }
    .assessment-visual-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0,1.25fr) minmax(260px,0.75fr);
      gap: 18px;
      align-items: end;
      min-height: 240px;
      padding: 24px;
    }
    .assessment-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(184,198,214,0.20);
      color: #e2e8f0;
      font-size: .74rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 14px;
    }
    .assessment-visual-title {
      font-size: clamp(1.55rem, 2.2vw, 2.15rem);
      line-height: 1.15;
      font-weight: 800;
      max-width: 650px;
      margin-bottom: 10px;
    }
    .assessment-visual-copy {
      color: rgba(241,245,249,0.84);
      max-width: 620px;
      line-height: 1.6;
    }
    .assessment-visual-side {
      backdrop-filter: blur(10px);
      background: rgba(8,17,31,0.5);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 18px;
      justify-self: stretch;
    }
    .assessment-visual-side h4 {
      font-size: 1rem;
      margin-bottom: 10px;
      color: #fff;
    }
    .assessment-mini-list {
      display: grid;
      gap: 8px;
    }
    .assessment-mini-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: rgba(226,232,240,0.9);
      font-size: .92rem;
      line-height: 1.45;
    }
    .assessment-mini-item::before {
      content: '•';
      color: #d4af37;
      font-weight: 900;
    }
    .assessment-photo-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .assessment-photo-card {
      position: relative;
      min-height: 135px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,0.22);
      background-size: cover;
      background-position: center;
    }
    .assessment-photo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,23,42,0.08), rgba(15,23,42,0.72));
    }
    .assessment-photo-label {
      position: absolute;
      left: 14px;
      bottom: 12px;
      right: 14px;
      z-index: 1;
      color: white;
      font-weight: 700;
      font-size: .92rem;
      line-height: 1.35;
    }


    
    .roadmap-page-hero,
    .tech-overview-grid,
    .technology-overview-page,
    .technology-overview-section,
    .roadmap-page-section {
      width: 100%;
    }
    .technology-overview-page .container,
    .roadmap-page-section .container {
      width: min(98vw, 1800px);
      margin: 0;
      padding-left: 40px;
      padding-right: 24px;
    }

    .roadmaps-screen > .container,
    .technology-overview-screen > .container {
      width: 100%;
      max-width: none;
      margin: 0;
      padding-left: 20px;
      padding-right: 20px;
    }
    .roadmaps-screen .results-header,
    .technology-overview-screen .results-header {
      text-align: left;
      margin: 0;
      padding-left: 0;
      padding-right: 0;
      max-width: 1280px;
    }
    .roadmaps-screen .results-header h1,
    .technology-overview-screen .results-header h1 {
      text-align: left;
      margin-left: 0;
    }
    .roadmaps-screen .results-header .subtitle,
    .technology-overview-screen .results-header .subtitle,
    .roadmaps-screen .results-header p,
    .technology-overview-screen .results-header p {
      text-align: left;
      max-width: 1200px;
      margin-left: 0;
      margin-right: 0;

                      <div className="lesson-row">
                        <div>
                          <div className="lesson-row-type">Knowledge check</div>
                          <div className="lesson-row-title">{selectedModule.quizTitle}</div>
                          <div className="lesson-row-meta">Technical terminology, readiness review, and module checkpoint • 40 questions</div>
                        </div>
                        <div className="lesson-pill">Assessment</div>
                      </div>
                    </div>
                  </div>

                  <div className="course-inline-note"><strong style={{color:'#2563eb'}}>Module progression:</strong> The same 10-module framework is used across programs, but examples, tools, standards, and specialization depth are aligned to this course.</div>

              )}

              {tab === 'careers' && (
                <div>
                  <div className="course-panel-header">
                    <div>
                      <div className="course-panel-label">Career Pathways</div>

                        <div className="muted">{path.desc}</div>

              )}

              {tab === 'certifications' && (
                <div>
                  <div className="course-panel-header">
                    <div>
                      <div className="course-panel-label">Certifications</div>
                      <div className="course-panel-title">Certifications & Standards</div>

                        </div>
                        <div className="lesson-pill">Recommended</div>
                      </div>
                    ))}
                  </div>

                  <div className="course-section-block">
                    <div className="course-section-title">Target Employers</div>
                    <div className="muted">{course.employers.join(' • ')}</div>
                  </div>

                  <div className="course-section-block">
                    <div className="course-section-title">Core Standards</div>
                    <div className="course-check-list">
                      {standards.map((standard, idx) => <div key={idx} className="course-check-item">{standard}</div>)}
                    </div>

                  <div className="course-top-cta">

                  </div>

              )}
            </main>
          </div>
        </div>
      );
    }
    function AssessmentApp() {
      const [currentScreen, setCurrentScreen] = useState('welcome');
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [answers, setAnswers] = useState({});
      const [results, setResults] = useState(null);
      const [selectedCourseKey, setSelectedCourseKey] = useState(null);

      const visibleQuestions = useMemo(() => getVisibleQuestions(answers), [answers]);
      const totalQuestions = answers[2]?.value === 'hs' ? questionDefs.length - 1 : questionDefs.length;
      const question = visibleQuestions[currentQuestion];
      const progress = totalQuestions ? ((currentQuestion + 1) / totalQuestions) * 100 : 0;

      const scrollToProgramOverview = () => {
        const runScroll = () => {
          const el = document.getElementById('program-overview-section');
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            el.style.outline = '2px solid rgba(34, 199, 255, 0.45)';
            el.style.outlineOffset = '10px';
            setTimeout(() => {
              el.style.outline = 'none';
              el.style.outlineOffset = '0px';
            }, 1800);
          }
        };

        if (currentScreen !== 'welcome') {
          setCurrentScreen('welcome');
          setTimeout(runScroll, 180);
        } else {
          setTimeout(runScroll, 60);
        }
      };

      React.useEffect(() => {
        if (currentQuestion >= visibleQuestions.length && visibleQuestions.length > 0) {
          setCurrentQuestion(visibleQuestions.length - 1);
        }
      }, [currentQuestion, visibleQuestions.length]);

      const handleSingleChoice = (questionId, option) => {
        setAnswers(prev => ({ ...prev, [questionId]: option }));
      };
      const handleMultipleChoice = (questionId, option) => {
        setAnswers(prev => {
          const current = prev[questionId] || [];
          const isSelected = current.some(item => item.value === option.value);
          return {
            ...prev,
            [questionId]: isSelected ? current.filter(item => item.value !== option.value) : [...current, option]
          };
        });
      };

      const canProceed = () => {
        if (!question) return false;
        const currentAnswer = answers[question.id];
        if (question.type === 'single') {
          if (!currentAnswer) return false;
          if (question.id === 21 && currentAnswer.value === 'other_major') {
            return !!answers['21_other']?.trim();
          }
          return true;
        }
        return currentAnswer && currentAnswer.length > 0;
      };

      const openCoursePage = (courseKey) => {
        setSelectedCourseKey(courseKey);
        setCurrentScreen('course');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const fitReasonsForCourse = (courseKey) => {
        const reasons = [];
        const learning = answers[3]?.value;
        const timeline = answers[6]?.value;
        const goal = answers[7]?.value;
        const familiarity = answers[22]?.value;
        const envs = (answers[8] || []).map(x => x.value);
        const field = answers[21]?.text || 'your background';

        reasons.push(`Matched against your selected interests and your background in ${field}.`);
        if (learning === 'hands_on' || learning === 'hybrid' || envs.includes('mixed') || envs.includes('manufacturing_env')) {
          reasons.push('Your responses show a strong preference for applied, hands-on learning with visible systems and lab-style practice.');
        } else {
          reasons.push('Your responses show a good fit for structured learning with clear progression from theory into practice.');
        }
        if (timeline === '3_6_months' || timeline === 'stackable') {
          reasons.push('You selected a faster or stackable timeline, which matches the 16-week intensive course structure.');
        }
        if (goal === 'immediate_job') {
          reasons.push('You emphasized employment readiness, so this course is presented with career pathways and salary ranges first.');
        }
        if (familiarity === 'beginner' || familiarity === 'some_exposure') {
          reasons.push('The module sequence is appropriate for building terminology and confidence before advanced pathway work.');
        }
        return reasons.slice(0, 4);
      };

      const calculateResults = () => {
        const scores = {
          veteran_fit: 0, acevets_fit: 0, ivets_fit: 0, tempo1_fit: 0, tempo2_fit: 0, tempo3_fit: 0,
          quantum_literacy: 0, ai_literacy: 0, robotics_literacy: 0, semiconductor_literacy: 0,
          fusion_literacy: 0, biotech_literacy: 0, manufacturing_literacy: 0, cybersecurity_literacy: 0,
          autonomous_literacy: 0, aerospace_literacy: 0, datacenter_literacy: 0
        };

        Object.values(answers).forEach(answer => {
          if (!answer || typeof answer !== 'object') return;
          if (Array.isArray(answer)) {
            answer.forEach(option => {
              Object.entries(option.score || {}).forEach(([key, value]) => { scores[key] = (scores[key] || 0) + value; });
            });
          } else if (answer.score) {
            Object.entries(answer.score).forEach(([key, value]) => { scores[key] = (scores[key] || 0) + value; });
          }
        });

        const techScores = [
          { name: 'Quantum Computing', key: 'quantum_literacy', courseKey: 'quantum', score: scores.quantum_literacy },
          { name: 'Artificial Intelligence', key: 'ai_literacy', courseKey: 'ai', score: scores.ai_literacy },
          { name: 'Robotics & Automation', key: 'robotics_literacy', courseKey: 'robotics', score: scores.robotics_literacy },
          { name: 'Semiconductors', key: 'semiconductor_literacy', courseKey: 'semiconductors', score: scores.semiconductor_literacy },
          { name: 'Fusion Energy', key: 'fusion_literacy', courseKey: 'fusion', score: scores.fusion_literacy },
          { name: 'Biotechnology', key: 'biotech_literacy', courseKey: 'biotech', score: scores.biotech_literacy },
          { name: 'Advanced Manufacturing', key: 'manufacturing_literacy', courseKey: 'manufacturing', score: scores.manufacturing_literacy },
          { name: 'Cybersecurity', key: 'cybersecurity_literacy', courseKey: 'cybersecurity', score: scores.cybersecurity_literacy },
          { name: 'Autonomous Systems (Drones)', key: 'autonomous_literacy', courseKey: 'autonomous', score: scores.autonomous_literacy },
          { name: 'Aerospace & Space Technologies', key: 'aerospace_literacy', courseKey: 'aerospace', score: scores.aerospace_literacy }
        ].sort((a,b) => b.score - a.score);

        const chosen = techScores.filter(t => t.score > 0);
        const topCourses = (chosen.length ? chosen : techScores).slice(0, 3);
        const secondaryCourses = (chosen.length ? chosen : techScores).slice(3, 5);

        const tempos = [
          { name: 'Tempo 1: 3-6 Month Accelerator', score: scores.tempo1_fit, description: 'Rapid workforce deployment' },
          { name: 'Tempo 2: 1-2 Year Technical Pathway', score: scores.tempo2_fit, description: 'Deeper technical specialization' },
          { name: 'Tempo 3: 4+ Year Degree Program', score: scores.tempo3_fit, description: 'Research and advanced roles' }
        ].sort((a,b) => b.score - a.score);

        const programRecommendation = scores.acevets_fit > scores.ivets_fit ? 'acevets' : scores.ivets_fit > scores.acevets_fit ? 'ivets' : 'both';

        const resultPayload = { scores, topCourses, secondaryCourses, recommendedTempo: tempos[0], programRecommendation, veteranFit: scores.veteran_fit };
        setResults(resultPayload);
        setSelectedCourseKey(topCourses[0]?.courseKey || null);
        setCurrentScreen('results');
      };

      const nextQuestion = () => {
        if (currentQuestion < visibleQuestions.length - 1) setCurrentQuestion(prev => prev + 1);
        else calculateResults();
      };
      const previousQuestion = () => { if (currentQuestion > 0) setCurrentQuestion(prev => prev - 1); };

      const downloadResults = () => {
        if (!results) return;
        const lines = [
          'EMERGING TECHNOLOGY LITERACY ASSESSMENT RESULTS',

          'TOP RECOMMENDATIONS:',
          ...results.topCourses.map((course, i) => `${i + 1}. ${course.name}`),
          '',
          'SECONDARY RECOMMENDATIONS:',
          ...results.secondaryCourses.map((course, i) => `${i + 1}. ${course.name}`),

          '',
          'NOTE: Prototype tuition estimates in the UI are placeholders for design review only.',
          '',

        ];

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'emerging-tech-assessment-results.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

                setCurrentScreen('roadmaps');
                window.scrollTo({ top: 0, behavior: 'smooth' });
              }}
            />
          </div>
        );
      }

      if (currentScreen === 'results' && results) {
        return (
          <div className="container results-wide">
            <div className="results-header">
              <h1 className="results-title">Your Personalized Pathway</h1>
              <p className="subtitle">Curriculum-based recommendations with course previews, pathways, standards, and interactive module sections</p>
            </div>

            <div className="recommendation-card">
              <h2 style={{ fontSize: '2rem', marginBottom: '20px', textAlign: 'center' }}>Recommended Program Focus</h2>
              <p style={{ textAlign: 'center', fontSize: '1.05rem', marginBottom: '14px' }}>
                {results.programRecommendation === 'acevets' && 'Your responses lean toward a stronger AceVETS fit: structured curriculum, credentialing, and guided progression.'}
                {results.programRecommendation === 'ivets' && 'Your responses lean toward a stronger iVETS fit: hands-on labs, operational readiness, and tactile learning.'}
                {results.programRecommendation === 'both' && 'Your profile supports an integrated path using both AceVETS and iVETS for academic structure plus applied proficiency.'}
              </p>
              <div className="score-meter">
                <div className="score-fill" style={{ width: `${(Math.max(results.scores.acevets_fit, results.scores.ivets_fit) / 25) * 100}%` }}></div>
                <div className="score-label">Tempo Match: {results.recommendedTempo.name}</div>
              </div>
            </div>

            <div className="card results-card">
              <h2 className="section-heading">Top Priority Course Matches</h2>
              <p className="soft-text" style={{marginBottom:'18px'}}>Click a course to open its own dedicated course page with overview, modules, career pathways, and certifications.</p>
              <div className="horizontal-course-row">
                {results.topCourses.map((rec, index) => {
                  const course = courseCatalog[rec.courseKey];
                  return (
                    <div key={rec.courseKey} className="course-card" onClick={() => openCoursePage(rec.courseKey)} style={{cursor:'pointer'}}>
                      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px'}}>
                        <span className="course-icon" style={{fontSize:'2.6rem', marginBottom:0}}>{course.icon}</span>
                        <span className="pill alt">Priority #{index + 1}</span>
                      </div>
                      <h3 className="course-title" style={{fontSize:'1.3rem', marginTop:'12px'}}>{course.name}</h3>
                      <p className="muted" style={{marginBottom:'12px'}}>{course.track}</p>
                      <div className="tech-badges" style={{margin:'10px 0 14px'}}>
                        <span className="pill">{course.duration}</span>
                        <span className="pill">{course.estimatePrice}</span>
                      </div>
                      <p className="muted">{course.overview}</p>
                      <button className="btn">Open Course</button>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="card results-card">
              <h2 className="section-heading">Secondary Recommendations</h2>
              <p className="soft-text" style={{marginBottom:'18px'}}>These are also strong matches based on your responses and may be worth exploring alongside your top picks.</p>
              <div className="horizontal-course-row secondary-row">
                {results.secondaryCourses.map((rec, index) => {
                  const course = courseCatalog[rec.courseKey];
                  return (
                    <div key={rec.courseKey} className="course-card" onClick={() => openCoursePage(rec.courseKey)} style={{cursor:'pointer'}}>
                      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px'}}>
                        <span className="course-icon" style={{fontSize:'2.4rem', marginBottom:0}}>{course.icon}</span>
                        <span className="pill">Secondary #{index + 1}</span>
                      </div>
                      <h3 className="course-title" style={{fontSize:'1.2rem', marginTop:'12px'}}>{course.name}</h3>
                      <p className="muted" style={{marginBottom:'12px'}}>{course.track}</p>
                      <div className="tech-badges" style={{margin:'10px 0 14px'}}>
                        <span className="pill">{course.duration}</span>
                        <span className="pill">{course.estimatePrice}</span>
                      </div>
                      <p className="muted">{course.overview}</p>
                      <button className="btn">Open Course</button>
                    </div>
                  );
                })}
              </div>
            </div>


            {results.veteranFit > 0 && (
              <div className="card">
                <h2 className="section-heading">🎖️ Veteran Readiness Assessment</h2>
                <p className="soft-text" style={{marginBottom:'16px'}}>Your military/veteran background supports disciplined learning, systems thinking, and operational readiness in high-demand technology sectors.</p>
                <div className="score-meter">
                  <div className="score-fill" style={{ width: `${(results.veteranFit / 15) * 100}%` }}></div>
                  <div className="score-label">Veteran Advantage Score: {results.veteranFit}/15</div>
                </div>
              </div>
            )}

            <div className="download-section">
              <h2 style={{ fontSize: '1.75rem', marginBottom: '16px' }}>📥 Save Your Prototype Results</h2>
              <p style={{ marginBottom: '24px', color: 'var(--text-gray)' }}>Download the current prototype summary. Tuition values in the UI are intentionally placeholder estimates for design review.</p>
              <button className="btn" onClick={downloadResults}>Download Results (TXT)</button>
              <button className="btn btn-secondary" onClick={() => { setCurrentScreen('welcome'); setCurrentQuestion(0); setAnswers({}); setResults(null); setSelectedCourseKey(null); }}>Start New Assessment</button>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AssessmentApp />);
  </script>
</body>
</html>
